# Conda environment for reproducing the Dark Patterns ABM paper results.
# Usage:
#   conda env create -f environment.yml
#   conda activate dark-patterns-abm
#   python reproduce.py
name: dark-patterns-abm
channels:
  - conda-forge
dependencies:
  - python=3.12.5
  - pip
  - pip:
      - mesa==3.5.1
      - networkx==3.6.1
      - numpy==2.4.6
      - pandas==3.0.3
      - matplotlib==3.11.0
